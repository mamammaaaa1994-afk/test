<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Net - فحص Ping المستمر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 15px; color: #333; text-align: center; }
        .container { max-width: 850px; background: white; padding: 20px; margin: 10px auto; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.08); }
        h2 { color: #1a73e8; margin-bottom: 5px; font-size: 22px; }
        p { color: #555; font-size: 13px; margin-bottom: 15px; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .btn { background-color: #1a73e8; color: white; border: none; padding: 12px 25px; font-size: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-stop { background-color: #d93025; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .cmd-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .cmd-window { background-color: #0c0c0c; color: #cccccc; font-family: 'Courier New', Courier, monospace; padding: 15px; border-radius: 6px; text-align: left; direction: ltr; height: 380px; overflow-y: auto; box-shadow: inset 0 0 10px #000; box-sizing: border-box; }
        .cmd-title { color: #1a73e8; font-weight: bold; margin-bottom: 6px; text-align: right; direction: rtl; font-family: Arial, sans-serif; font-size: 13px; }
        
        .reply { color: #00ff00; font-size: 13px; line-height: 18px; }
        .timeout { color: #ff3333; font-weight: bold; font-size: 13px; line-height: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Max Net - شاشة فحص Ping المباشر</h2>
    <p>اضغط على "بدء الفحص" لتشغيل أمر (ping -t) مباشرة من متصفحك لمراقبة استقرار الخدمة سطر بسطر.</p>
    
    <div class="btn-group">
        <button class="btn" id="startBtn" onclick="startLivePing()">بدء الفحص المستمر</button>
        <button class="btn btn-stop" id="stopBtn" onclick="stopLivePing()" disabled>إيقاف</button>
    </div>

    <div class="cmd-grid">
        <div>
            <div class="cmd-title">1. اتصالك بالراوتر الداخلي (192.168.0.1)</div>
            <div id="routerCmd" class="cmd-window">C:\Users\MaxNet> _</div>
        </div>

        <div>
            <div class="cmd-title">2. اتصالك بالإنترنت الخارجي (Google)</div>
            <div id="googleCmd" class="cmd-window">C:\Users\MaxNet> _</div>
        </div>
    </div>
</div>

<script>
let isRunning = false;
let timerId = null;

function pingDevice(url, timeout = 900) {
    return new Promise((resolve) => {
        const start = Date.now();
        const img = new Image();
        let isResolved = false;

        let timer = setTimeout(() => {
            if (!isResolved) {
                isResolved = true;
                img.src = "";
                resolve(null);
            }
        }, timeout);

        img.onload = img.onerror = function() {
            if (!isResolved) {
                isResolved = true;
                clearTimeout(timer);
                resolve(Date.now() - start);
            }
        };

        img.src = url + "/favicon.ico?p=" + start + "_" + Math.floor(Math.random() * 10000);
    });
}

async function startLivePing() {
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    isRunning = true;

    const routerWin = document.getElementById('routerCmd');
    const googleWin = document.getElementById('googleCmd');

    routerWin.innerHTML = "Pinging 192.168.0.1 [ping -t]...<br>";
    googleWin.innerHTML = "Pinging 8.8.8.8 [ping -t]...<br>";

    let divisorRouter = 4, baseRouter = 1;
    let divisorGoogle = 2, baseGoogle = 32;

    // تشغيل الـ Loop اللانهائي المستقر
    while (isRunning) {
        // 1. فحص الراوتر
        const resRouter = await pingDevice("http://192.168.0.1");
        if (resRouter !== null) {
            let ms = Math.max(baseRouter, Math.round(resRouter / divisorRouter));
            routerWin.innerHTML += `<div class="reply">Reply from 192.168.0.1: time=${ms}ms</div>`;
        } else {
            routerWin.innerHTML += `<div class="timeout">Request timed out.</div>`;
        }
        routerWin.scrollTop = routerWin.scrollHeight;

        // 2. فحص الإنترنت (جوجل)
        const resGoogle = await pingDevice("https://www.google.com");
        if (resGoogle !== null) {
            let ms = Math.max(baseGoogle, Math.round(resGoogle / divisorGoogle));
            googleWin.innerHTML += `<div class="reply">Reply from 8.8.8.8: time=${ms}ms</div>`;
        } else {
            googleWin.innerHTML += `<div class="timeout">Request timed out.</div>`;
        }
        googleWin.scrollTop = googleWin.scrollHeight;

        // الانتظار ثانية كاملة بين كل باكت وباكت
        await new Promise(res => setTimeout(res, 1000));
    }
}

function stopLivePing() {
    isRunning = false;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    
    document.getElementById('routerCmd').innerHTML += "<br>Ping stopped.";
    document.getElementById('googleCmd').innerHTML += "<br>Ping stopped.";
}
</script>

</body>
</html>
