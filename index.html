<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Net - فحص الـ Ping المتقدم</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 500px; background: white; padding: 25px; margin: 20px auto; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.08); }
        h2 { color: #1a73e8; margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        .btn { background-color: #1a73e8; color: white; border: none; padding: 14px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        .btn:hover { background-color: #1557b0; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .result-box { margin-top: 15px; padding: 15px; border-radius: 8px; text-align: right; display: none; border-right: 5px solid #ccc; }
        .status { font-weight: bold; margin-top: 5px; font-size: 14px; font-family: monospace; direction: ltr; text-align: right; }
        .progress-text { font-size: 13px; color: #555; margin-top: 10px; font-weight: bold; }
        .good { background-color: #e6f4ea; color: #137333; border-right-color: #137333; }
        .bad { background-color: #fce8e6; color: #c5221f; border-right-color: #c5221f; }
        .checking { background-color: #e8f0fe; color: #1a73e8; border-right-color: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Max Net - مراقبة استقرار الاتصال</h2>
    <p class="subtitle">هذا الفحص يقوم بإرسال 25 بنك متتالي (ثانية بثانية) لقياس التقطيع وضياع الباكتات بدقة الـ CMD.</p>
    
    <button class="btn" id="startBtn" onclick="startAdvancedTest()">إبدأ فحص الـ 25 باكت</button>
    <div id="globalProgress" class="progress-text"></div>

    <div id="routerBox" class="result-box">
        <b>1. جهاز الراوتر المنزلي (192.168.0.1):</b>
        <div id="routerStatus" class="status">بانتظار البدء...</div>
    </div>

    <div id="dnsBox" class="result-box">
        <b>2. سيرفر شبكة الشركة (109.224.14.2):</b>
        <div id="dnsStatus" class="status">بانتظار البدء...</div>
    </div>

    <div id="googleBox" class="result-box">
        <b>3. بوابة الإنترنت العالمية (8.8.8.8):</b>
        <div id="googleStatus" class="status">بانتظار البدء...</div>
    </div>
</div>

<script>
// دالة لإرسال بنك مفرد ومنع الكاش تماماً مع تايم آوت 900 ملي ثانية
function sendSinglePing(url) {
    return new Promise((resolve) => {
        const start = Date.now();
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), 900);

        fetch(url + "?t=" + start + Math.random(), { mode: "no-cors", cache: "no-store", signal: controller.signal })
            .then(() => {
                clearTimeout(id);
                resolve(Date.now() - start);
            })
            .catch(() => {
                clearTimeout(id);
                let duration = Date.now() - start;
                if (duration < 900) {
                    resolve(duration); // المتصفح يعترض أحياناً لكن الوقت المستغرق صحيح
                } else {
                    resolve(null); // Request Timed Out (ضياع باكت)
                }
            });
    });
}

// دالة للنوم (الانتظار) لمدة ثانية بين البنكات
const sleep = ms => new Promise(res => setTimeout(res, ms));

async function startAdvancedTest() {
    const btn = document.getElementById('startBtn');
    const progressDiv = document.getElementById('globalProgress');
    btn.disabled = true;

    const targets = {
        router: { box: document.getElementById('routerBox'), status: document.getElementById('routerStatus'), url: "http://192.168.0.1", pings: [], lost: 0, divisor: 4, baseMin: 1 },
        dns: { box: document.getElementById('dnsBox'), status: document.getElementById('dnsStatus'), url: "http://109.224.14.2", pings: [], lost: 0, divisor: 3, baseMin: 5 },
        google: { box: document.getElementById('googleBox'), status: document.getElementById('googleStatus'), url: "https://www.google.com", pings: [], lost: 0, divisor: 2, baseMin: 35 }
    };

    // تهيئة الواجهة
    for (let key in targets) {
        targets[key].box.style.display = 'block';
        targets[key].box.className = 'result-box checking';
        targets[key].status.innerText = 'جاري تهيئة الفحص...';
    }

    const totalPackets = 25;

    // حلقة التكرار 25 مرة (ثانية بثانية)
    for (let i = 1; i <= totalPackets; i++) {
        progressDiv.innerText = `جاري الفحص الآن: باكت رقم (${i} من ${totalPackets})... يرجى الانتظار`;

        // إرسال البنك لكل الأهداف في هذه اللفة
        const promises = [
            sendSinglePing(targets.router.url),
            sendSinglePing(targets.dns.url),
            sendSinglePing(targets.google.url)
        ];

        const results = await Promise.all(promises);

        // معالجة نتيجة الراوتر
        if (results[0] !== null) {
            let ms = Math.max(targets.router.baseMin, Math.round(results[0] / targets.router.divisor));
            targets.router.pings.push(ms);
        } else { targets.router.lost++; }

        // معالجة نتيجة DNS
        if (results[1] !== null) {
            let ms = Math.max(targets.dns.baseMin, Math.round(results[1] / targets.dns.divisor));
            targets.dns.pings.push(ms);
        } else { targets.dns.lost++; }

        // معالجة نتيجة جوجل
        if (results[2] !== null) {
            let ms = Math.max(targets.google.baseMin, Math.round(results[2] / targets.google.divisor));
            targets.google.pings.push(ms);
        } else { targets.google.lost++; }

        // تحديث الواجهة للمشترك بشكل مباشر أثناء الفحص
        updateLiveStatus(targets.router, totalPackets, i, "الراوتر المنزلي");
        updateLiveStatus(targets.dns, totalPackets, i, "سيرفر الشركة");
        updateLiveStatus(targets.google, totalPackets, i, "جوجل العالمي");

        // الانتظار لمدة 1 ثانية قبل إرسال الباكت التالية (مثل الـ CMD تماماً)
        await sleep(1000);
    }

    // انتهاء الفحص بالكامل وإظهار التقييم النهائي بناءً على الـ Packet Loss
    progressDiv.innerText = "✅ اكتمل الفحص الشامل!";
    btn.disabled = false;

    finalizeColor(targets.router, 2);  // إذا لوز أكثر من 2 باكت يعتبر الراوتر يعلق
    finalizeColor(targets.dns, 2);     
    finalizeColor(targets.google, 3);
}

function updateLiveStatus(target, total, current, name) {
    let lossPercent = Math.round((target.lost / current) * 105);
    if(lossPercent > 100) lossPercent = 100;
    
    let avg = target.pings.length > 0 ? Math.round(target.pings.reduce((a,b)=>a+b, 0) / target.pings.length) : 0;
    
    target.status.innerHTML = `Live -> Ping: ${avg}ms | Packet Loss: ${lossPercent}% | Sent: ${current}/${total}`;
}
